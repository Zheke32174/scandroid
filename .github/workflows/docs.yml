# Builds the MkDocs site on push to main + deploys to GitHub Pages.
#
# Settings → Pages → Source: GitHub Actions (set this once in the
# repo's Pages settings; without it the deploy step succeeds but the
# site doesn't go live).
#
# The job uses the modern actions/deploy-pages flow rather than the
# older gh-pages branch dance — fewer moving parts, no second branch
# to manage, and the action's environment-protection makes it
# straightforward to require manual review for production deploys
# later if we want.

name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Single in-flight deploy at a time; the latest push wins.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install MkDocs + Material
        run: |
          python -m pip install --upgrade pip
          # Pin majors. Patch updates are fine; we re-check majors
          # quarterly via dependabot. Material is the only theme we
          # ship; pymdown-extensions is required by the markdown_
          # extensions block in mkdocs.yml.
          pip install \
            "mkdocs>=1.6,<2" \
            "mkdocs-material>=9.5,<10" \
            "pymdown-extensions>=10.7,<11"
      - name: Build site
        run: mkdocs build --strict
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
