# MkDocs site for scandroid — the cluster's public bridge.
#
# Deployed to https://zheke32174.github.io/scandroid/ via the
# .github/workflows/docs.yml action on push to main. The site is
# intentionally outward-facing: it explains what scandroid does for
# anyone landing here from a code search, GitHub trending, or a
# referral, without leaking private cluster details.
#
# Theme: Material for MkDocs — common, well-maintained, accessible.
# Heavy customization avoided so future agents can edit content
# without learning theme internals.

site_name: scandroid
site_description: >-
  Public bridge artifact of the understory cluster — Colab GPU
  offload + Codespaces user-auth automation + agent action 2FA gate.
site_url: https://zheke32174.github.io/scandroid/
repo_url: https://github.com/Zheke32174/scandroid
repo_name: Zheke32174/scandroid
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Bridge:
    - Colab GPU offload: colab-bridge.md
    - Healthcheck pre-flight: healthcheck.md
  - Auth:
    - GitHub OAuth (device flow): oauth.md
    - Google OAuth (device flow): google-oauth.md
  - Codespaces:
    - Session ctxmgr: codespaces.md
  - Agent action 2FA: agent-2fa-gate.md
  - Agent reach boundaries: agent-reach-boundaries.md
  - Recipes:
    - Drive deposit (notebook handoff): recipes/drive-deposit.md
    - Playwright in a Codespace: recipes/playwright-in-codespace.md
    - Bitwarden CLI bridge: recipes/bitwarden-bridge.md
    - ChatGPT anonymous via Codespace: recipes/chatgpt-anonymous-via-codespace.md
  - Operator test walkthrough: operator-test-walkthrough.md
  - Posts:
    - Index: posts/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Zheke32174/scandroid
